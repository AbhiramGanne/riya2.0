<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- White Background -->
  <rect width="400" height="400" fill="#ffffff" />
  
  <!-- Outer double border -->
  <rect x="12" y="12" width="376" height="376" fill="none" stroke="#0f3443" stroke-width="4.5" />
  <rect x="18" y="18" width="364" height="364" fill="none" stroke="#475569" stroke-width="1.5" />
  
  <!-- Inner Thin Circle Frame -->
  <circle cx="200" cy="180" r="110" fill="none" stroke="#cbd5e1" stroke-width="1.5" />
  
  <!-- Stylized Teal Arrow pointing up-right -->
  <path d="M 195 120 L 278 130 L 238 218 Q 232 195 190 185 Q 165 178, 116 202 Q 155 180, 190 176 L 195 120 Z" fill="#0c7489" />
  
  <!-- White Bull silhouette overlapping the arrow -->
  <path d="M 190 176 C 180 162, 170 150, 150 165 C 130 178, 116 202, 116 202 C 116 202, 140 180, 175 180 C 185 180, 192 186, 190 198 C 188 208, 194 213, 202 216 L 232 198 C 228 190, 222 182, 232 178 C 236 176, 234 165, 226 166 C 220 167, 218 158, 224 153 C 215 152, 204 158, 205 168 C 206 172, 198 174, 190 176 Z" fill="#ffffff" stroke="#0c7489" stroke-width="1.5" stroke-linejoin="round" />
  
  <!-- Bull Eye and Detail -->
  <circle cx="222" cy="172" r="2" fill="#0f172a" />
  
  <!-- Brand Name -->
  <text x="200" y="325" font-family="'Inter', 'Space Grotesk', 'Helvetica', sans-serif" font-size="36" font-weight="900" fill="#0f172a" text-anchor="middle" letter-spacing="8">HAPPEQUITY</text>
  
  <!-- Subtitle with gentle curve under circle -->
  <path id="curve" d="M 120 286 A 110 110 0 0 0 280 286" fill="none" stroke="none" />
  <text font-family="'Inter', 'Helvetica', sans-serif" font-size="10.5" font-weight="700" fill="#475569">
    <textPath href="#curve" startOffset="50%" text-anchor="middle" letter-spacing="4.5">
      INVESTMENTS &amp; FINANCE
    </textPath>
  </text>
</svg>
